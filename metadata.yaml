# This file defines repository metadata for PR compliance checklist mapping.
# This is an example configuration that should be customized for your organization's repositories.
# Place this file in your pr-agent-settings repository for hierarchical compliance management.


# Backend Python service
user-service:
  pr_compliance_checklist_paths:
    - "groups/python"
    - "groups/backend_repos"

# Frontend React application
dashboard-ui:
  pr_compliance_checklist_paths:
    - "groups/javascript"
    - "groups/front-end"

# Monorepo with multiple services
platform-monorepo:
  pr_compliance_checklist_paths:
    - "platform-monorepo"
  monorepo_subprojects:
    api-service:
      pr_compliance_checklist_paths:
        - "groups/python"
    web-client:
      pr_compliance_checklist_paths:
        - "groups/typescript"
        - "groups/front-end"
